name: CI/CD Pipeline - Microservices

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: BUILD & TEST
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test Microservices
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [ms-project, ms-resources, ms-analytics, ms-collaboration]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven - ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: mvn clean package -DskipTests=false --no-transfer-progress

      - name: Run Tests - ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: mvn test --no-transfer-progress

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.service }}
          path: ./${{ matrix.service }}/target/surefire-reports/

  # ─────────────────────────────────────────────
  # JOB 2: DOCKER BUILD & PUSH
  # ─────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      matrix:
        service: [ms-project, ms-resources, ms-analytics, ms-collaboration]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR - ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image - ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 3: SERVERLESS DEPLOY (simulated)
  # ─────────────────────────────────────────────
  deploy-serverless:
    name: Deploy Serverless Function
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies - serverless function
        working-directory: ./serverless
        run: npm install

      - name: Run serverless function tests
        working-directory: ./serverless
        run: npm test

      - name: Deploy summary
        run: |
          echo "✅ Serverless function validated successfully"
          echo "📦 Function: notification-handler"
          echo "🌐 Runtime: Node.js 18"
          echo "📋 Trigger: HTTP POST /notify"

  # ─────────────────────────────────────────────
  # JOB 4: DEPLOY SUMMARY
  # ─────────────────────────────────────────────
  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [docker-build-push, deploy-serverless]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Print deployment summary
        run: |
          echo "════════════════════════════════════════"
          echo "  ✅ CI/CD PIPELINE COMPLETED"
          echo "════════════════════════════════════════"
          echo "  Services deployed:"
          echo "  📦 ms-project:8080"
          echo "  📦 ms-resources:8081"
          echo "  📦 ms-analytics:8082"
          echo "  📦 ms-collaboration:8083"
          echo "  ⚡ Serverless: notification-handler"
          echo "  Commit: ${{ github.sha }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "════════════════════════════════════════"
