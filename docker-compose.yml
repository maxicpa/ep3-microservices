version: '3.8'

networks:
  microservices-net:
    driver: overlay
    attachable: true

services:

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    networks:
      - microservices-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  ms-project:
    image: ${DOCKER_USERNAME:-myuser}/ms-project:latest
    build:
      context: ./ms-project
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    networks:
      - microservices-net
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
      - SPRING_DATA_MONGODB_HOST=mongodb
      - SPRING_DATA_MONGODB_PORT=27017
    depends_on:
      - mongodb
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  ms-resources:
    image: ${DOCKER_USERNAME:-myuser}/ms-resources:latest
    build:
      context: ./ms-resources
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    networks:
      - microservices-net
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8081
      - SPRING_DATA_MONGODB_HOST=mongodb
      - SPRING_DATA_MONGODB_PORT=27017
    depends_on:
      - mongodb
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  ms-analytics:
    image: ${DOCKER_USERNAME:-myuser}/ms-analytics:latest
    build:
      context: ./ms-analytics
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    networks:
      - microservices-net
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8082
      - SPRING_DATA_MONGODB_HOST=mongodb
      - SPRING_DATA_MONGODB_PORT=27017
    depends_on:
      - mongodb
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  ms-collaboration:
    image: ${DOCKER_USERNAME:-myuser}/ms-collaboration:latest
    build:
      context: ./ms-collaboration
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    networks:
      - microservices-net
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8083
      - SPRING_DATA_MONGODB_HOST=mongodb
      - SPRING_DATA_MONGODB_PORT=27017
    depends_on:
      - mongodb
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
