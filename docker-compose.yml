version: '3.8'

networks:
  microservices-net:
    driver: overlay
    attachable: true

services:

  ms-project:
    image: ${DOCKER_USERNAME:-myuser}/ms-project:latest
    build:
      context: ./ms-project
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    networks:
      - microservices-net
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ms-resources:
    image: ${DOCKER_USERNAME:-myuser}/ms-resources:latest
    build:
      context: ./ms-resources
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    networks:
      - microservices-net
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8081
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ms-analytics:
    image: ${DOCKER_USERNAME:-myuser}/ms-analytics:latest
    build:
      context: ./ms-analytics
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    networks:
      - microservices-net
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8082
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ms-collaboration:
    image: ${DOCKER_USERNAME:-myuser}/ms-collaboration:latest
    build:
      context: ./ms-collaboration
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    networks:
      - microservices-net
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8083
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
